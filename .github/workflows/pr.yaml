name: PR
on:
  workflow_dispatch: {}
  pull_request:
    branches:
      - main

  workflow_call:

permissions: {}

jobs:
  analyze-code:
    name: Analyze Code
    runs-on: ubuntu-2404-2core
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
      - name: Install Dependencies
        uses: ./.github/actions/build-dependencies
      - name: Lint
        run: |
          if test -z "$(gofmt -l .)"; then
              echo "Congrats! There is nothing to fix."
          else
              echo "The following lines should be fixed."
              gofmt -s -d .
              exit 1
          fi
        shell: bash

      - name: Install staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@ff63afafc529279f454e02f1d060210bd4263951 # 2026.1 (v0.7.0)
          sudo cp ${HOME}/go/bin/staticcheck /usr/bin/
        shell: bash

      - name: Install revive
        run: |
          go install github.com/mgechev/revive@815ffde4de8dcb31a2de91efd6c6795d75e24380 # v1.15.0
          sudo cp ${HOME}/go/bin/revive /usr/bin/
        shell: bash

      - name: Install goimports-reviser
        run: |
          go install github.com/incu6us/goimports-reviser/v3@fa5587e51ba33c58734984cb41370a5b2582d5b7 # v3.12.6
          sudo cp ${HOME}/go/bin/goimports-reviser /usr/bin/
        shell: bash

      - name: Install errcheck
        run: |
          go install github.com/kisielk/errcheck@4d54a96416c48063572cc1c24ae072fff58a63b4 # v1.20.0
          sudo cp ${HOME}/go/bin/errcheck /usr/bin/
        shell: bash

      - name: Check Code Style
        run: |
          make fmt-check
        shell: bash

      - name: Lint (Revive)
        run: |
          make lint-check
        shell: bash

  libbpfgo-unit-tests:
    name: libbpfgo Unit Tests
    runs-on: ubuntu-2404-2core
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        go-version:
          [
            "1.18",
            "1.19",
            "1.20",
            "1.21",
            "1.22",
            "1.23",
            "1.24",
            "1.25",
            "stable",
          ]
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
      - name: Install Dependencies
        uses: ./.github/actions/build-dependencies
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test libbpfgo
        run: |
          make libbpfgo-static-test

  self-tests:
    name: Selftests
    runs-on: ubuntu-2404-4core
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        go-version:
          [
            "1.18",
            "1.19",
            "1.20",
            "1.21",
            "1.22",
            "1.23",
            "1.24",
            "1.25",
            "stable",
          ]
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
      - name: Install Dependencies
        uses: ./.github/actions/build-dependencies
        with:
          go-version: ${{ matrix.go-version }}
      - name: Static Selftests
        run: |
          make selftest-static-run
